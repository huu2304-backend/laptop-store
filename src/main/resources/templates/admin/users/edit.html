<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Edit User</title></head>
<body>
<h1>Edit User</h1>
<form th:action="@{/admin/users/edit/{id}(id=${user.id})}" th:object="${user}" method="post">
    <label>Username: <input th:field="*{username}"/></label>
    <label>Password: <input th:field="*{password}" type="password"/></label>
    <button type="submit">Save</button>
</form>
</body>
</html>
