<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/fragments/layout :: layout('Sửa danh mục', ~{::mainContent})}">
<body>
    <th:block th:fragment="mainContent">
        <div class="page-header">
            <div>
                <h1>Sửa danh mục</h1>
                <p>Cập nhật thông tin danh mục</p>
            </div>
            <a th:href="@{/admin/categories}" class="btn-secondary">
                <span>←</span> Quay lại
            </a>
        </div>

        <div class="form-container">
            <form th:action="@{/admin/categories/edit/{id}(id=${category.id})}" th:object="${category}" method="post">
                <input type="hidden" th:field="*{id}">
                
                <div class="form-group">
                    <label for="name">Tên danh mục</label>
                    <input type="text" id="name" th:field="*{name}" placeholder="Nhập tên danh mục..." required>
                </div>
                
                <div style="margin-top: 30px;">
                    <button type="submit" class="btn-primary">Cập nhật danh mục</button>
                    <a th:href="@{/admin/categories}" class="btn-secondary" style="margin-left: 10px;">Hủy</a>
                </div>
            </form>
        </div>
    </th:block>
</body>
</html>
