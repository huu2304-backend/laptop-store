<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Add Category</title></head>
<body>
<h1>Add Category</h1>
<form th:action="@{/admin/categories/add}" th:object="${category}" method="post">
    <label>Name: <input th:field="*{name}"/></label>
    <button type="submit">Save</button>
</form>
</body>
</html>
