<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Categories</title>
</head>
<body>
<h1>Categories</h1>
<a th:href="@{/admin/categories/add}">Add</a>
<table>
    <tr><th>ID</th><th>Name</th><th>Actions</th></tr>
    <tr th:each="c : ${categories}">
        <td th:text="${c.id}"></td>
        <td th:text="${c.name}"></td>
        <td>
            <a th:href="@{/admin/categories/edit/{id}(id=${c.id})}">Edit</a>
            <form th:action="@{/admin/categories/delete/{id}(id=${c.id})}" method="post" style="display:inline">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
</table>
</body>
</html>
